<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Styler - Relvet</title>
    
    <!-- Google Fonts for UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ------------------- */
        /* --- App Shell CSS (with Click-to-Toggle Sidebar) --- */
        /* ------------------- */
        :root {
            --primary-color: #f59e0b; --primary-hover: #fbbf24;
            --bg-color: #f8f9fa; --content-bg: #ffffff; --sidebar-bg: #111827;
            --text-color: #111827; --text-secondary: #4b5563; --border-color: #e5e7eb;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --sidebar-width: 260px; --topbar-height: 60px; --border-radius: 12px;
        }
        body.dark-mode {
            --bg-color: #121212; --content-bg: #1e1e1e; --sidebar-bg: #1e1e1e;
            --text-color: #e5e5e5; --text-secondary: #888888; --border-color: #2e2e2e;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-color);
            transition: background-color 0.3s, color 0.3s; display: flex;
        }
        .sidebar {
            position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width);
            background-color: var(--sidebar-bg); color: #e5e5e5; padding: 20px;
            display: flex; flex-direction: column; transform: translateX(-100%); /* Hidden by default */
            transition: transform 0.3s ease-in-out; z-index: 1000;
        }
        .sidebar.active { transform: translateX(0); }
        .main-content {
            width: 100%; display: flex; flex-direction: column;
            flex-grow: 1; height: 100vh;
        }
        .top-bar {
            height: var(--topbar-height); background-color: var(--content-bg);
            border-bottom: 1px solid var(--border-color); display: flex; align-items: center;
            padding: 0 20px; z-index: 900; box-shadow: var(--shadow); flex-shrink: 0;
        }
        #menu-btn {
            background: none; border: none; cursor: pointer; padding: 5px; z-index: 2;
        }
        #menu-btn svg { width: 24px; height: 24px; stroke: var(--text-color); }
        .app-title {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 10px; font-size: 1.2rem;
            font-weight: 600; color: var(--text-color);
        }
        .app-title svg { width: 28px; height: 28px; color: var(--primary-color); }
        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
        }
        .sidebar-logo { font-size: 1.5rem; font-weight: 600; }
        #close-sidebar-btn {
            background: none; border: none; color: #9ca3af; font-size: 1.5rem;
            cursor: pointer; transition: color 0.2s;
        }
        #close-sidebar-btn:hover { color: white; }
        .sidebar-nav ul { list-style: none; }
        .sidebar-nav li a {
            display: flex; align-items: center; gap: 12px; color: #d1d5db; text-decoration: none; padding: 15px;
            border-radius: 8px; font-weight: 500; transition: background-color 0.2s, color 0.2s; cursor: pointer;
        }
        .sidebar-nav li a:hover, .sidebar-nav li a.active {
            background-color: rgba(255, 255, 255, 0.1); color: white;
        }
        .page-container {
            padding: 30px; flex-grow: 1; overflow-y: auto; /* This makes the container scrollable */
        }
        h1.page-title { font-size: 2.5rem; margin-bottom: 30px; flex-shrink: 0; }
        .btn {
            display: inline-block; padding: 12px 28px; border-radius: 8px; font-size: 1rem;
            text-decoration: none; font-weight: 600; transition: all 0.2s ease;
            background-color: var(--primary-color); color: white; border: none; cursor: pointer;
        }
        .btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); z-index: 999;
            opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        
        /* ------------------- */
        /* --- Tool Specific CSS --- */
        /* ------------------- */
        #tool-workspace {
            background-color: var(--content-bg); padding: 30px;
            border-radius: var(--border-radius); box-shadow: var(--shadow);
            height: 100%; display: flex; flex-direction: column;
        }
        .tool-page { display: none; height: 100%; flex-direction: column; }
        .tool-page.active { display: flex; }
        .editor-controls { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-group label { font-weight: 600; color: var(--text-secondary); }
        #template-selector {
            padding: 12px; font-size: 1rem; border-radius: 8px;
            border: 1px solid var(--border-color); background-color: var(--bg-color);
            color: var(--text-color); font-family: 'Poppins', sans-serif;
        }
        #notes-editor {
            width: 100%; flex-grow: 1; min-height: 300px; padding: 15px;
            font-family: 'Courier New', Courier, monospace; font-size: 15px;
            border: 1px solid var(--border-color); border-radius: 8px;
            resize: none; background-color: var(--bg-color); color: var(--text-color);
        }
        .editor-footer { margin-top: 20px; text-align: right; flex-shrink: 0; }
        #viewer-frame { width: 100%; height: 100%; border: 1px solid var(--border-color); border-radius: 8px; }
        #save-feedback { color: var(--primary-color); font-weight: 600; opacity: 0; transition: opacity 0.5s; margin-right: 20px; }
    </style>
</head>

                    </div>
                    <div class="editor-footer">
                        <span id="save-feedback">Saved!</span>
                        <button id="save-btn" class="btn"><i class="fas fa-save"></i> Save Changes</button>
                    </div>
                </div>

                <!-- Viewer Page -->
                <div id="viewer-page" class="tool-page">
                    <iframe id="viewer-frame" title="Note Preview"></iframe>
                </div>
            </div>
        </main>
    </div>

        // --- 2. DOM ELEMENT REFERENCES & UI LOGIC ---
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-sidebar-btn');
        const overlay = document.getElementById('overlay');
        const editorPage = document.getElementById('editor-page');
        const viewerPage = document.getElementById('viewer-page');
        const pageTitle = document.getElementById('page-title');
        const templateSelector = document.getElementById('template-selector');
        const notesEditor = document.getElementById('notes-editor');
        const saveBtn = document.getElementById('save-btn');
        const saveFeedback = document.getElementById('save-feedback');
        const viewerFrame = document.getElementById('viewer-frame');
        const navLinks = {
            editor: document.getElementById('nav-editor'),
            viewer: document.getElementById('nav-viewer'),
            download: document.getElementById('nav-download')
        };
        
        // --- Sidebar Toggle Logic ---
        const openSidebar = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
        const closeSidebar = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
        menuBtn.addEventListener('click', openSidebar);
        closeBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);


        // --- 3. CORE FUNCTIONS ---
        
        /**
         * NEW: Cleans user input, converting simple Markdown to HTML.
         * @param {string} rawHtml - The raw text from the editor.
         * @returns {string} The cleaned HTML string.
         */
        function cleanAndProcessInput(rawHtml) {
            let cleanedHtml = rawHtml;
            // Convert **bold** to <strong>
            cleanedHtml = cleanedHtml.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Convert *italic* to <em>
            cleanedHtml = cleanedHtml.replace(/(?<!\*)\*(?!\*)(.*?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            return cleanedHtml;
        }

        function populateTemplateSelector() {
            templates.forEach(template => {
                const option = document.createElement('option');
                option.value = template.id;
                option.textContent = template.name;
                templateSelector.appendChild(option);
            });
        }

        function saveData() {
            const cleanedContent = cleanAndProcessInput(notesEditor.value);
            const data = {
                bodyContent: cleanedContent, // Save the cleaned content
                selectedTemplateId: templateSelector.value
            };
            localStorage.setItem('relvetNotesStylerData', JSON.stringify(data));
            
            // Also update the editor view with the cleaned content so the user sees the change
            notesEditor.value = cleanedContent;

            saveFeedback.style.opacity = '1';
            setTimeout(() => { saveFeedback.style.opacity = '0'; }, 2000);
        }

        function loadData() {
            const savedData = localStorage.getItem('relvetNotesStylerData');
            if (savedData) {
                const data = JSON.parse(savedData);
                notesEditor.value = data.bodyContent || '';
                templateSelector.value = data.selectedTemplateId || templates[0].id;
            }
        }

        function buildFullHtml() {
            const cleanedUserContent = cleanAndProcessInput(notesEditor.value);
            const selectedTemplateId = templateSelector.value;
            const template = templates.find(t => t.id === selectedTemplateId);
            if (!template) { console.error("Template not found!"); return ''; }
            return template.content.replace('[USER_CONTENT_HERE]', cleanedUserContent);
        }

        function updateViewer() {
            viewerFrame.srcdoc = buildFullHtml();
        }

        function downloadSource() {
            const blob = new Blob([buildFullHtml()], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'styled-note.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function switchPage(pageName) {
            editorPage.classList.toggle('active', pageName === 'editor');
            viewerPage.classList.toggle('active', pageName === 'viewer');
            pageTitle.textContent = pageName.charAt(0).toUpperCase() + pageName.slice(1);
            Object.values(navLinks).forEach(link => link.classList.remove('active'));
            if (navLinks[pageName]) navLinks[pageName].classList.add('active');
            if (pageName === 'viewer') updateViewer();
            closeSidebar();
        }

        // --- 4. EVENT LISTENERS ---
        saveBtn.addEventListener('click', saveData);
        navLinks.editor.addEventListener('click', (e) => { e.preventDefault(); switchPage('editor'); });
        navLinks.viewer.addEventListener('click', (e) => { e.preventDefault(); switchPage('viewer'); });
        navLinks.download.addEventListener('click', (e) => { e.preventDefault(); downloadSource(); });

        // --- 5. INITIALIZATION ---
        populateTemplateSelector();
        loadData();
    });
    </script>
