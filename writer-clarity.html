<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Clarity Suite - Relvet</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #0d9488; --primary-hover: #14b8a6; --bg-color: #f8f9fa; 
            --content-bg: #ffffff; --sidebar-bg: #111827; --text-color: #111827; 
            --text-secondary: #4b5563; --border-color: #e5e7eb; --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --sidebar-width: 260px; --topbar-height: 60px; --border-radius: 12px;
            --highlight-hard: rgba(252, 211, 77, 0.5); /* Yellow */
            --highlight-very-hard: rgba(248, 113, 113, 0.5); /* Red */
            --highlight-passive: rgba(96, 165, 250, 0.5); /* Blue */
            --highlight-adverb: rgba(74, 222, 128, 0.5); /* Green */
        }
        body.dark-mode {
            --bg-color: #121212; --content-bg: #1e1e1e; --sidebar-bg: #1e1e1e;
            --text-color: #e5e5e5; --text-secondary: #888888; --border-color: #2e2e2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s; overflow-x: hidden; display: flex; flex-direction: column; }
        
        /* --- Relvet Template Shell --- */
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width); background-color: var(--sidebar-bg); color: #e5e5e5; padding: 20px; display: flex; flex-direction: column; transform: translateX(-100%); transition: transform 0.3s ease-in-out; z-index: 1000; }
        .sidebar.active { transform: translateX(0); }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .sidebar-logo { font-size: 1.5rem; font-weight: 600; }
        #close-sidebar-btn { background: none; border: none; color: #9ca3af; font-size: 1.5rem; cursor: pointer; }
        .sidebar-nav ul { list-style: none; }
        .sidebar-nav li a { display: block; color: #d1d5db; text-decoration: none; padding: 15px; border-radius: 8px; font-weight: 500; transition: background-color 0.2s, color 0.2s; cursor: pointer; }
        .sidebar-nav li a:hover { background-color: rgba(255, 255, 255, 0.1); color: white; }
        .main-content { padding-top: var(--topbar-height); transition: margin-left 0.3s ease-in-out; flex-grow: 1; display: flex; flex-direction: column; }
        body.sidebar-active .main-content { margin-left: var(--sidebar-width); }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-height); background-color: var(--content-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 20px; z-index: 900; box-shadow: var(--shadow); }
        #menu-btn { background: none; border: none; cursor: pointer; padding: 5px; z-index: 2; }
        #menu-btn svg { width: 24px; height: 24px; stroke: var(--text-color); }
        .app-title { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: 600; }
        .app-title svg { width: 28px; height: 28px; color: var(--primary-color); }
        .page-container { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        h1 { font-size: 2.5rem; margin-bottom: 30px; }
        .donate-footer { padding: 25px; text-align: center; background-color: var(--content-bg); border-top: 1px solid var(--border-color); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 999; opacity: 0; visibility: hidden; transition: opacity 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }

        /* --- Tool Specific CSS --- */
        .clarity-suite { display: grid; grid-template-columns: 1fr; gap: 30px; flex-grow: 1; min-height: 60vh; }
        @media (min-width: 1024px) { .clarity-suite { grid-template-columns: minmax(0, 1.5fr) minmax(320px, 1fr); } }
        .editor-panel, .dashboard-panel { background-color: var(--content-bg); border-radius: var(--border-radius); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
        .editor-panel { padding: 20px; }
        #editor { flex-grow: 1; outline: none; border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; font-size: 1.1rem; line-height: 1.7; overflow-y: auto; }
        #editor:empty:before { content: 'Start writing or paste your text here...'; color: var(--text-secondary); cursor: text; }
        .highlight-hard { background-color: var(--highlight-hard); }
        .highlight-very-hard { background-color: var(--highlight-very-hard); }
        .highlight-passive { background-color: var(--highlight-passive); }
        .highlight-adverb { background-color: var(--highlight-adverb); }

        .dashboard-panel { padding: 30px; }
        .dashboard-panel h2 { margin-bottom: 20px; border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; font-size: 1.5rem; }
        .score-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; border-radius: 8px; background-color: var(--bg-color); }
        .score-card .label { font-weight: 600; font-size: 1.1rem; }
        .score-card .value { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stat-item { padding: 10px; background-color: var(--bg-color); border-radius: 8px; }
        .stat-item .label { font-size: 0.9rem; color: var(--text-secondary); }
        .stat-item .value { font-size: 1.2rem; font-weight: 600; }
        .legend { margin-top: 20px; }
        .legend h3 { margin-bottom: 10px; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .legend-color { width: 20px; height: 20px; border-radius: 4px; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><span class="sidebar-logo">Relvet Menu</span><button id="close-sidebar-btn">&times;</button></div>
        <nav class="sidebar-nav"><ul>
            <li><a href="index.html">Back to All Tools</a></li>
            <li><a href="https://studynowmed.my.canva.site/donate-relvet" target="_blank">Rate Us</a></li>
            <li><a href="https://studynowmed.my.canva.site/donate-relvet" target="_blank">Donate</a></li>
        </ul></nav>
    </aside>
    <div class="main-content" id="main-content">
        <header class="top-bar">
            <button id="menu-btn"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg></button>
            <div class="app-title"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487zm0 0L19.5 7.125" /></svg><span>Writing Clarity Suite</span></div>
        </header>
        <main class="page-container" id="page-container">
            <div class="clarity-suite">
                <div class="editor-panel">
                    <div id="editor" contenteditable="true" spellcheck="true"></div>
                </div>
                <div class="dashboard-panel">
                    <h2>Analysis Dashboard</h2>
                    <div class="score-card">
                        <span class="label">Readability Grade</span>
                        <span class="value" id="grade-level">-</span>
                    </div>
                     <div class="score-card">
                        <span class="label">Reading Ease Score</span>
                        <span class="value" id="reading-ease">-</span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item"><span class="label">Word Count</span><div class="value" id="word-count">0</div></div>
                        <div class="stat-item"><span class="label">Sentence Count</span><div class="value" id="sentence-count">0</div></div>
                        <div class="stat-item"><span class="label">Characters</span><div class="value" id="character-count">0</div></div>
                        <div class="stat-item"><span class="label">Avg. Words/Sentence</span><div class="value" id="words-per-sentence">0</div></div>
                    </div>
                    <div class="legend">
                        <h3>Highlight Legend</h3>
                        <div class="legend-item"><div class="legend-color" style="background-color: var(--highlight-hard);"></div>Hard to read sentence</div>
                        <div class="legend-item"><div class="legend-color" style="background-color: var(--highlight-very-hard);"></div>Very hard to read</div>
                        <div class="legend-item"><div class="legend-color" style="background-color: var(--highlight-passive);"></div>Passive voice</div>
                        <div class="legend-item"><div class="legend-color" style="background-color: var(--highlight-adverb);"></div>Adverb</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="overlay" id="overlay"></div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- FULLY FUNCTIONAL APP SHELL SCRIPT ---
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-sidebar-btn');
        const overlay = document.getElementById('overlay');
        if (menuBtn && sidebar && closeBtn && overlay) {
            const openSidebar = () => { sidebar.classList.add('active'); overlay.classList.add('active'); document.body.classList.add('sidebar-active'); };
            const closeSidebar = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); document.body.classList.remove('sidebar-active'); };
            menuBtn.addEventListener('click', openSidebar);
            closeBtn.addEventListener('click', closeSidebar);
            overlay.addEventListener('click', closeSidebar);
        }

        // --- WRITING CLARITY SUITE SCRIPT ---
        const editor = document.getElementById('editor');
        const ui = {
            gradeLevel: document.getElementById('grade-level'),
            readingEase: document.getElementById('reading-ease'),
            wordCount: document.getElementById('word-count'),
            sentenceCount: document.getElementById('sentence-count'),
            characterCount: document.getElementById('character-count'),
            wordsPerSentence: document.getElementById('words-per-sentence'),
        };

        const commonAdverbs = new Set(['very', 'really', 'actually', 'just', 'quite', 'rather', 'so', 'too', 'truly', 'fairly', 'highly', 'greatly', 'extremely']);
        const passiveRegex = /\b(am|are|is|was|were|be|been|being)\b\s*(\w+ed\b|\w+en\b)/i;

        // --- CORE ANALYSIS ENGINE ---
        function analyze() {
            // Save cursor position before manipulation
            const cursor = saveCursorPosition(editor);
            
            const text = editor.innerText;
            localStorage.setItem('claritySuiteText', text);
            
            const sentences = getSentences(text);
            const words = getWords(text);
            const stats = calculateStats(text, words, sentences);
            
            updateDashboard(stats);
            applyHighlights(sentences, cursor);
        }

        function calculateStats(text, words, sentences) {
            const wordCount = words.length;
            const sentenceCount = sentences.length;
            const syllableCount = words.reduce((acc, word) => acc + countSyllables(word), 0);
            
            if (wordCount === 0 || sentenceCount === 0) return { wordCount: 0, sentenceCount: 0, characterCount: 0, fleschKincaid: 0, readingEase: 0, gunningFog: 0, wordsPerSentence: 0 };

            const wordsPerSentence = wordCount / sentenceCount;
            const syllablesPerWord = syllableCount / wordCount;

            // Flesch-Kincaid Grade Level
            const fleschKincaid = 0.39 * wordsPerSentence + 11.8 * syllablesPerWord - 15.59;
            // Flesch Reading Ease
            const readingEase = 206.835 - 1.015 * wordsPerSentence - 84.6 * syllablesPerWord;
            // Gunning Fog Index
            const complexWords = words.filter(word => countSyllables(word) >= 3).length;
            const gunningFog = 0.4 * (wordsPerSentence + 100 * (complexWords / wordCount));

            return {
                wordCount, sentenceCount, characterCount: text.length,
                fleschKincaid: Math.max(0, fleschKincaid),
                readingEase: Math.max(0, readingEase),
                gunningFog: Math.max(0, gunningFog),
                wordsPerSentence
            };
        }
        
        function updateDashboard(stats) {
            ui.gradeLevel.textContent = stats.fleschKincaid.toFixed(1);
            ui.readingEase.textContent = stats.readingEase.toFixed(1);
            ui.wordCount.textContent = stats.wordCount;
            ui.sentenceCount.textContent = stats.sentenceCount;
            ui.characterCount.textContent = stats.characterCount;
            ui.wordsPerSentence.textContent = stats.wordsPerSentence.toFixed(1);
        }

        // --- HIGHLIGHTING ENGINE ---
        function applyHighlights(sentences, cursor) {
            let html = '';
            sentences.forEach(sentence => {
                const words = getWords(sentence);
                if (words.length === 0) return;

                let sentenceClass = '';
                if (words.length > 25) sentenceClass = 'highlight-very-hard';
                else if (words.length > 15) sentenceClass = 'highlight-hard';
                
                let highlightedSentence = sentence.replace(/\b(\w+ly)\b/gi, (match, p1) => `<span class="highlight-adverb">${p1}</span>`);
                highlightedSentence = highlightedSentence.replace(/(\b(am|are|is|was|were|be|been|being)\b\s*(\w+ed\b|\w+en\b))/gi, `<span class="highlight-passive">$&</span>`);
                
                html += `<span class="${sentenceClass}">${highlightedSentence}</span> `;
            });

            editor.innerHTML = html;
            // Restore cursor position after updating innerHTML
            restoreCursorPosition(editor, cursor);
        }

        // --- TEXT PARSING UTILITIES ---
        function getSentences(text) {
            return text.match(/[^.!?]+[.!?]*\s*/g) || [];
        }

        function getWords(text) {
            return text.match(/\b[\w']+\b/g) || [];
        }

        function countSyllables(word) {
            word = word.toLowerCase().replace(/[^a-z]/g, '');
            if (word.length <= 3) return 1;
            word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
            word = word.replace(/^y/, '');
            const vowelGroups = word.match(/[aeiouy]{1,2}/g);
            return vowelGroups ? vowelGroups.length : 0;
        }

        // --- CURSOR MANAGEMENT (CRITICAL FOR UX) ---
        function saveCursorPosition(context) {
            const selection = window.getSelection();
            if (selection.rangeCount === 0) return null;
            const range = selection.getRangeAt(0);
            const preSelectionRange = range.cloneRange();
            preSelectionRange.selectNodeContents(context);
            preSelectionRange.setEnd(range.startContainer, range.startOffset);
            return preSelectionRange.toString().length;
        }

        function restoreCursorPosition(context, charIndex) {
            if (charIndex === null) return;
            let range = document.createRange();
            let sel = window.getSelection();
            let treeWalker = document.createTreeWalker(context, Node.TEXT_NODE, null, false);
            let charCount = 0;

            while (treeWalker.nextNode()) {
                const nodeLength = treeWalker.currentNode.length;
                if (charCount + nodeLength >= charIndex) {
                    range.setStart(treeWalker.currentNode, charIndex - charCount);
                    range.collapse(true);
                    sel.removeAllRanges();
                    sel.addRange(range);
                    return;
                }
                charCount += nodeLength;
            }
        }

        // --- EVENT LISTENERS & INITIALIZATION ---
        let debounceTimer;
        editor.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(analyze, 300); // Debounce to prevent lag on fast typing
        });

        function loadState() {
            const savedText = localStorage.getItem('claritySuiteText');
            if (savedText) {
                editor.innerText = savedText;
                analyze();
            }
        }

        loadState();
    });
    </script>
</body>
</html>
